<script type="text/javascript">

// Base URL for loading Google Static Maps of team cities:

//var static_map_baseurl = 'http://maps.googleapis.com/maps/api/staticmap?key=AIzaSyCxH09ucYT3ydq4OhL3RlcOm_0WiiDpbNs&zoom=12&scale=2&maptype=roadmap&style=feature:landscape|saturation:-100|lightness:65|visibility:on&style=feature:poi|saturation:-100|lightness:51|visibility:simplified&style=feature:road.highway|saturation:-100|visibility:simplified&style=feature:road.arterial|saturation:-100|lightness:30|visibility:on&style=feature:road.local|saturation:-100|visibility:simplified|lightness:40&style=feature:transit|saturation:-100|visibility:simplified&style=feature:water|element:labels|visibility:on|saturation:-100|lightness:-25&style=feature:water|element:geometry|hue:0xffff00|lightness:-25|saturation:-97&center='
var static_map_baseurl = 'http://maps.googleapis.com/maps/api/staticmap?key=AIzaSyCxH09ucYT3ydq4OhL3RlcOm_0WiiDpbNs&zoom=12&scale=2&maptype=terrain&center=';

// Load Google GeoChart API and initialize world map:

google.load( 'visualization', '1', { packages: [ 'geochart' ] } );
google.setOnLoadCallback( drawWorld );

// Global variables:

var geochart;
var data;
var options;
var leagues;
var teams;
var selected_country;
var geochart_listener;
var image_cache = {}; 

// Define unique colors for each country's soccer league on homepage:

var country_colors = [ '#a6cee3', '#fdbf6f', '#b2df8a', '#1f78b4', '#fb9a99', '#ff7f00', '#e31a1c', '#33a02c', '#cab2d6' ];

// Define GeoChart map options for displaying world soccer leagues:

var options_leagues = {
  height: '100%',
  width: '100%',
  legend: 'none',
  tooltip: {
    isHtml: true,
    showTitle: false
    //trigger: 'selection'
  },
  dataMode: 'regions',
  resolution: 'countries',
  displayMode: 'regions',
  colorAxis: {
    colors: country_colors
  }
};

// Define GeoChart map options for displaying soccer teams within a league:

var options_teams = {
  height: '100%',
  width: '100%',
  legend: 'none',
  tooltip: {
    isHtml: true,
    showTitle: false
    //trigger: 'selection'
  },
  dataMode: 'regions',
  resolution: 'provinces',
  displayMode: 'markers',
  colorAxis: {
    colors: [ 'red', 'red' ]
  }
};

/*
drawWorld()
Draws the world map of soccer with each country assigned a unique color and
whose pop-up indicates that country's professional soccer league. Leagues
are also listed in a scroll-down list along the side of the page. FIFA
tops the list of world soccer leagues.
*/

function drawWorld () {

  // Initialize GeoChart map?:

  if ( !geochart ) {
    var container = document.getElementById( 'map' );
    geochart = new google.visualization.GeoChart( container );
  }

  // Always make sure that the list of soccer leagues is scrolled to page top:

  scrollToPageTop( 'elements' );

  // Read in the JSON data of world soccer leagues asynchronously and display:

  if ( !leagues ) {
    $.ajax(
      {
        async: true,
        url: 'leagues.json?v=1',
        dataType: 'json',
        success: function ( response ) {
          leagues = response; // set global var
          drawLeagues();
          listLeagues();
        }
      }
    );
  }
  else {
    drawLeagues();
    listLeagues();
  }

} // drawWorld()


/*
drawLeagues()
Having received the JSON of data related to world soccer leagues, this function
draws the map highlighting the polygon of each league's country. 
*/

function drawLeagues () {

  // Define GeoChart data array containing each country's league.
  // NOTE: "Ranking" is useless here. GeoChart requires a numeric data entity
  // in the 2nd column, which we are not using. The 3rd column defines the
  // pop-up content in GeoChart when hovering over markers:
 
  var all_leagues_data = [
    [ 'Country', 'Ranking', { 'role': 'tooltip', 'p': { 'html': true } } ]
  ]; 

  // Compile the data and display properties for each league:

  var i = 0;

  for ( var country in leagues ) {

    var flag = leagues[ country ][ 'flag' ];
    var league = leagues[ country ][ 'league' ];
    var logo = leagues[ country ][ 'logo' ];
    var founded = leagues[ country ][ 'founded' ];
    var season = leagues[ country ][ 'season' ];
    var champ = leagues[ country ][ 'champ' ];
    var champ_year = leagues[ country ][ 'champ_year' ];  

    // Some logos specify their width in pixels if they cannot be dynamically
    // resized like SVG PNG's from Wikimedia can:
  
    var logo_width = 0;

    if ( typeof( leagues[ country ][ 'logo_width' ] ) != 'undefined' ) {
      logo_width = leagues[ country ][ 'logo_width' ];
    }

    // Some leagues give their season a name and/or have multiple seasons:

    var season_name = null;
    var season2 = null;
    var season2_name = null;

    if ( typeof( leagues[ country ][ 'season_name' ] ) != 'undefined' ) {
      season_name = leagues[ country ][ 'season_name' ]; 
    }
 
    if ( typeof( leagues[ country ][ 'season2' ] ) != 'undefined' ) {
      season2 = leagues[ country ][ 'season2' ];
    }

    if ( typeof ( leagues[ country ][ 'season2_name' ] ) != 'undefined' ) {
      season2_name = leagues[ country ][ 'season2_name' ];
    }

    // Some leagues have multiple categories of champions:

    var champ_name = null;
    var champ2 = null;
    var champ2_name = null;

    if ( typeof( leagues[ country ][ 'champ_name' ] ) != 'undefined' ) {
      champ_name = leagues[ country ][ 'champ_name' ]; 
    }
 
    if ( typeof( leagues[ country ][ 'champ2' ] ) != 'undefined' ) {
      champ2 = leagues[ country ][ 'champ2' ];
    }

    if ( typeof ( leagues[ country ][ 'champ2_name' ] ) != 'undefined' ) {
      champ2_name = leagues[ country ][ 'champ2_name' ];
    }
   
    if ( typeof ( leagues[ country ][ 'champ2_year' ] ) != 'undefined' ) {
      champ2_year = leagues[ country ][ 'champ2_year' ];
    } 

    // Need small league logo when hovering over marker icons on map:

    var small_logo = getSmallLogo( logo, 0.75, logo_width );

    // Define the pop-up content for this league when the user hovers over its
    // marker on the world map:

    var popup = '<table><tr style="white-space: nowrap;"><td><p><font size="+1"><b>' + league + '</b></font></p><p>' + country + '</p><p>Founded: ' + founded + '</p><p>'

    if ( season_name ) {
      popup += season_name + ': ';
    }
    else {
      popup += 'Season: ';
    }

    popup += season + '</p>';

    if ( season2 ) {
      popup += '<p>'; 
      if ( season2_name ) {
        popup += season2_name + ': ';
      }
      else {
        popup += 'Season: ';
      }
      popup += season2 + '</p>';
    }

    popup += '<p>' + champ_year + ' ';

    if ( champ_name ) {
      popup += champ_name + ': ';
    }
    else {
      popup += 'champ: ';
    }

    popup += '<i>' + champ + '</i></p>';

    if ( champ2 ) {
      popup += '<p>' + champ2_year + ' ';
      if ( champ2_name ) {
        popup += champ2_name + ': ';
      }
      else {
        popup += 'champ: '; 
      }
      popup += '<i>' + champ2 + '</i></p>';
    }
 
    popup += '</td><td>' + small_logo + '</td></tr></table>';

    // Define the GeoChart data for this league:
 
    var league_data = [
      country,
      i,
      popup
    ];

    all_leagues_data.push( league_data );

    i++;
  }

  // Convert array to Google Visualization API data object:

  all_leagues_data = google.visualization.arrayToDataTable( all_leagues_data );

  // Clear any previously displayed map:

  geochart.clearChart();

  // Make sure the options for this chart default to the world view:

  options_leagues.region = null;

  // Draw the leagues on the map:
 
  geochart.draw( all_leagues_data, options_leagues );

  // Set global variables in case we need to modify this map in some fashion:

  data = all_leagues_data;
  options = options_leagues;

  // Click listener to draw each country's teams when selected; first remove
  // any previous map listener:

  if ( geochart_listener ) {
    google.visualization.events.removeListener( geochart_listener );
  }

  geochart_listener = google.visualization.events.addListener(
    geochart,
    'select',
    function () {
      var selectedItem = geochart.getSelection()[ 0 ];
      if ( selectedItem ) {
        var country = all_leagues_data.getValue( selectedItem.row, 0 );
        drawCountry( country );
      }
    }
  );

  // Add/remove icons and buttons to the map:

  document.getElementById( 'home_button' ).style.display = 'none';
  document.getElementById( 'flag_button' ).style.display = 'none';
  document.getElementById( 'flag_button' ).innerHTML = '';
  document.getElementById( 'anthem_div' ).style.display = 'none';
  document.getElementById( 'anthem_div' ).innerHTML = '';
  document.getElementById( 'element_button' ).style.display = 'none';
  document.getElementById( 'element_button' ).innerHTML = '';  
  document.getElementById( 'region_button' ).style.display = '';

} // drawWorld()


/*
listLeagues()
Lists all of the world soccer leagues in the scrollable left-hand sidebar.
*/

function listLeagues () {

  // Change sidebar subheader:
 
  document.getElementById( 'subheader' ).innerHTML = 'Soccer Leagues:';

  // Make sure scrollable sidebar is scrolled to the very top:

  scrollToPageTop( 'elements' );

  // We are going to sort the leagues by demonyms ("Dutch", "English", etc.): 

  var all_leagues_html = '';

  var countries = [];

  for ( var country in leagues ) {
    countries.push( country );
  }

  for ( var i = 0; i < countries.sort( function ( a, b ) { return sortLeaguesByDemonym( leagues, a, b ); }  ).length; i++ ) {

    var country = countries[ i ];
    var country_code = leagues[ country ][ 'code' ];
    var demonym = leagues[ country ][ 'demonym' ]; 
    var flag = leagues[ country ][ 'flag' ];
    var league = leagues[ country ][ 'league' ];
    var logo = leagues[ country ][ 'logo' ];

    var logo_width = '';

    if ( typeof( leagues[ country ][ 'logo_width' ] ) != 'undefined' ) {
      logo_width = leagues[ country ][ 'logo_width' ];
    }

    // Get index of this team in the original counries array (for highlighting
    // purposes below):

    j = 0;

    for ( var k = 0; k < countries.sort().length; k++ ) {
      if ( country == countries[ k ] ) {
        j = k;
        break; 
      }
    }
 
    // Define the HTML for this soccer league:

    var league_html = '';
    league_html += '<div class="element" onClick="drawCountry( \'' + country + '\' );" onMouseOver="geochart.setSelection( [ { row: ' + j + ' } ] );" onMouseOut="geochart.setSelection();">';
    league_html += '  <h4>' + demonym + ' League:</h4>';
    league_html += '  <table style="width: 100%;">';
    league_html += '    <tr valign="center">';
    league_html += '      <td style="width: 50%;" align="right"><img class="flag" src="' + flag + '" /></td>';
    league_html += '      <td style="width: 50%;" align="left"><img src="' + logo + '" width="' + logo_width + '" /></td>';
    league_html += '    </tr>';
    league_html += '  </table>';
    league_html += '</div>';

    all_leagues_html += league_html;
  }

  // Define FIFA entry:

  var fifa_html = '';
  fifa_html += '<div class="element" onClick="drawCountry();">';
  fifa_html += '  <h4>International Federation:</h4>';
  fifa_html += '  <table style="width: 100%;">';
  fifa_html += '    <tr valign="center">';
  fifa_html += '      <td style="width: 50%;" align="right"><img class="flag" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/World_Map_FIFA.svg/150px-World_Map_FIFA.svg.png" /></td>';
  fifa_html += '      <td style="width: 50%;" align="left"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/FIFA_logo_without_slogan.svg/150px-FIFA_logo_without_slogan.svg.png" /></td>';
  fifa_html += '    </tr>';
  fifa_html += '  </table>';
  fifa_html += '</div>';
 
  // Start the leagues list with FIFA international, then list country leagues:

  document.getElementById( 'elements' ).innerHTML = fifa_html;
  document.getElementById( 'elements' ).innerHTML += all_leagues_html;

} // listLeagues()


/*
drawCountry()
Draws all the teams associated with the specified country or defaults to
showing the world's soccer leagues. 
*/

function drawCountry ( country ) {

  // Hide static city map if any drawn yet:

  //document.getElementById( 'static_map_div' ).style.display = 'none';
  
  // Display map of teams associated with this country:

  if ( country ) {

    var league = leagues[ country ][ 'league' ];
    var country_code = leagues[ country ][ 'code' ];

    // Read in the JSON data of teams associated with this soccer league
    // asynchronously and display:

    $.ajax(
      {
        async: true,
        url: country_code + '.json?v=11',
        dataType: 'json',
        success: function ( response ) {
          teams = response; // set global var
          selected_country = country;
          drawTeams( country );
          listTeams( country );
        }
      }
    );
  }

  // Otherwise, display the world map of soccer leagues:

  else {
    drawWorld();
  }

} // drawCountry()


/*
drawTeams()
Having received the JSON of data related to a particular country's soccer
teams, this function draws the map with markers at each team's city. 
*/

function drawTeams ( country ) {

  // Grab league metadata:

  var country_code = leagues[ country ][ 'code' ];
  var league = leagues[ country ][ 'league' ];
  var ranking_year = leagues[ country ][ 'ranking_year' ]; 

  // Begin GeoChart data array for each team:

  var all_teams = []; // array of team names only
  var all_teams_data = [
    [ 'Latitude', 'Longitude', 'Ranking', { 'role': 'tooltip', 'p': { 'html': true } } ]
  ];

  // Loop through each team and add to array:

  var num_teams = Object.keys(teams).length;

  for ( var team in teams ) {

    all_teams.push( team );

    // Compile the data and display properties for this team:

    var city = teams[ team ][ 'city' ];
    var latitude = teams[ team ][ 'latitude' ];
    var longitude = teams[ team ][ 'longitude' ];
    var logo = teams[ team ][ 'logo' ];
    var founded = teams[ team ][ 'founded' ];
    var ranking = teams[ team ][ 'ranking' ];

    var full_name = '';
    if ( teams[ team ][ 'full_name' ] ) {
      full_name = teams[ team ][ 'full_name' ];
    }

    var nickname = ''; 
    if ( teams[ team ][ 'nickname' ] ) {
      nickname = teams[ team ][ 'nickname' ];
    }

    var note = '';
    if ( teams[ team ][ 'note' ] ) { 
      note = teams[ team ][ 'note' ];
    } 

    // Inverse of rank will determine size of marker on map (e.g. rank #1 out
    // 20 teams would get an inverse ranking of 20):
  
    var ranking_inverse = num_teams - ranking + 1;

    // Need small logo when hovering over marker icons on map:

    var small_logo = getSmallLogo( logo, 0.5 );

    // Define pop-up HTML content to appear when hovering over marker:

    var popup = '';
    popup += '<table>';
    popup += '  <tr style="white-space: nowrap;">';
    popup += '    <td><p><font size="+1"><b>' + team + '</b></font></p>';

    if ( full_name ) {
      popup += '    <p>' + full_name + '</p>';
    }

    if ( nickname ) {
      popup += '    <p><i>' + nickname + '</i></p>';
    }
 
    popup += '<p>' + city + '</p><p>Founded: ' + founded + '</p><p>' + ranking_year + ' ranking: #' + ranking + '</p>';

    if ( note ) { 
      popup += '<p><b>NOTE</b>: ' + note + '</p>'; 
    } 

    popup += '    </td>';
    popup += '    <td>' + small_logo + '</td>';
    popup += '  </tr>';
    popup += '</table>';
 
    var team_data = [
      latitude,
      longitude,
      ranking_inverse,
      popup
    ];

    all_teams_data.push( team_data );
  }

  // Convert array to Google Visualization API data object:

  all_teams_data = google.visualization.arrayToDataTable( all_teams_data );

  // Set the map region to the league's country:

  options_teams.region = country_code;

  // Clear any previously displayed map:

  geochart.clearChart();

  // Draw the teams on the map:

  geochart.draw( all_teams_data, options_teams );

  // Set global variables in case we need to modify this map in some fashion:

  data = all_teams_data;
  options = options_teams;

  // Add icons and buttons to the map:

  var flag = leagues[ country ][ 'flag' ];
  var logo = leagues[ country ][ 'logo' ];
  var url = leagues[ country ][ 'url' ];
  var small_flag = getSmallLogo( flag, null, null, 100, 'getUrlOnly' );
  //var small_logo = getSmallLogo( logo, null, null, 100, 'getUrlOnly' ); 

  var logo_img = '<a href="' + url + '" target="_blank"><img src="' + logo + '" title="' + league + '. Click to open their homepage in a new tab..." /></a>';
 
  document.getElementById( 'home_button' ).style.display = ''; 

  document.getElementById( 'element_button' ).innerHTML = logo_img;
  document.getElementById( 'element_button' ).style.display = '';

  // Add Google URLs to league's schedule, standings, and news buttons:

  var schedule_url = 'http://www.google.com/search?q=' + league + ' schedule';
  var standings_url = 'http://www.google.com/search?q=' + league + ' standings';
  var news_url = 'http://news.google.com/news/section?q=' + league;

  schedule_url = schedule_url.replace( / /g, '+' );
  standings_url = standings_url.replace( / /g, '+' );
  news_url = news_url.replace( / /g, '+' );

  document.getElementById( 'schedule_url' ).href = schedule_url; 
  document.getElementById( 'standings_url' ).href = standings_url;
  document.getElementById( 'news_url' ).href = news_url;

  // Some countries use alternative name from GeoChart (e.g. England instead
  // of United Kingdom):

  var country_name = country;

  if ( leagues[ country ][ 'country1' ] ) {
    country_name = leagues[ country ][ 'country1' ];
  }

  // Are there more than one home countries?:

  var country_url = leagues[ country ][ 'country_url' ];
  var flag_img = '<a href="' + country_url + '" target="_blank"><img src="' + small_flag + '" title="' + country_name + '. Read about me on Wikipedia..." /></a>';

  if ( leagues[ country ][ 'flag2' ] ) {
    var country2 = leagues[ country ][ 'country2' ];
    var country_url2 = leagues[ country ][ 'country_url2' ];
    var flag2 = leagues[ country ][ 'flag2' ];
    var small_flag2 = getSmallLogo( flag2, null, null, 100, 'getUrlOnly' );
    flag_img += '<br/><a href="' + country_url2 + '" target="_blank"><img src="' + small_flag2 + '" title="' + country2 + '. Read about me on Wikipedia..." style="margin-top: 12px;" /></a>'; 
  }

  document.getElementById( 'flag_button' ).innerHTML = flag_img;
  document.getElementById( 'flag_button' ).style.display = '';
  document.getElementById( 'region_button' ).style.display = 'none';

  // Show audio player for national anthem:

  var anthem = leagues[ country ][ 'anthem' ];
  var anthem_audio = '<center><audio controls title="' + country + '\'s national anthem..."><source src="' + anthem + '" type="audio/ogg"></audio></center>';
  document.getElementById( 'anthem_div' ).innerHTML = anthem_audio;
  document.getElementById( 'anthem_div' ).style.display = '';
  
  // Click listener to draw each country's teams when selected; first remove
  // any previous map listener:

  if ( geochart_listener ) {
    google.visualization.events.removeListener( geochart_listener );
  }

  geochart_listener = google.visualization.events.addListener(
    geochart,
    'select',
    function () {
      var selectedItem = geochart.getSelection()[ 0 ];
      if ( selectedItem ) {
        var team = all_teams[ selectedItem.row ];
        drawTeam( team );
      }
    }
  );

} // drawTeams()


/*
listTeams()
Lists all of the soccer teams affiliated with the specified country's league
in the scrollable left-hand sidebar.
*/
 
function listTeams ( country, sort_by ) {

  // Default team sorting is by rank:

  if ( !sort_by ) {
    sort_by = 'ranking';
  }

  // Change sidebar subheader:

  var league = leagues[ country ][ 'league' ];
  document.getElementById( 'subheader' ).innerHTML = league + ':';

  // Make sure scrollable sidebar is scrolled to the very top:

  scrollToPageTop( 'elements' );

  // Compile the HTML for each team; assumes underlying JSON is already sorted:

  var all_teams_html = '';

  // Provide option to sort alphabetically or by most recent ranking:

  var ranking_year = leagues[ country ][ 'ranking_year' ];

  all_teams_html += '<p style="margin-bottom: 10px;"><b>sort by: ';

  if ( sort_by == 'name' ) {
    all_teams_html += '<i>';
  }

  all_teams_html += '<a href="javascript:void(0)" onClick="listTeams( \'' + country + '\', \'name\'  ); this.blur();">name</a>';

  if ( sort_by == 'name' ) {
    all_teams_html += '</i>';
  }

  all_teams_html += ' &#149; ';

  if ( sort_by == 'ranking' ) { 
    all_teams_html += '<i>';
  }

  all_teams_html += '<a href="javascript:void(0)" onClick="listTeams( \'' + country + '\', \'ranking\'  ); this.blur();">rank (' + ranking_year + ')</a>';

  if ( sort_by == 'ranking' ) {
    all_teams_html += '</i>';
  }

  all_teams_html += '</b></p>';
  
  var names = [];

  for ( var team in teams ) {
    names.push( team );
  }

  var names_by_ranking = [];

  if ( sort_by == 'ranking' ) {
    for ( var i = 0; i < names.sort( function ( a, b ) { return sortTeamsByRanking( teams, a, b ); } ).length; i++ ) {
      names_by_ranking.push( names[ i ] );
    }
    names = names_by_ranking;
  }

  for ( var i = 0; i < names.length; i++ ) {

    var team = names[ i ];

    var logo = teams[ team ][ 'logo' ]; 
    var ranking = teams[ team ][ 'ranking' ];

    // Get index of this team in alphabetic order so we know what its
    // position is in geochart for highlighting below onMouseOver:

    var j = 0;
    for ( var this_team in teams ) {
      if ( this_team == team ) {
        break;
      }
      j++;
    }

    var trophy = '';
    if ( ranking == 1 ) {
      trophy += '  <h4 style="position: absolute; bottom: 60px; right: 10px;" ><font color="gold" size="+4" ><i class="fa fa-trophy fa-lg"></i></font></h4>';
    }
 
    var team_html = '';
    team_html += '<div class="element" style="position: relative;" onClick="" onMouseOver="geochart.setSelection( [ { row: ' + j + ' } ] );" onMouseOut="geochart.setSelection();">';
    team_html += '  <h4>' + team + ':</h4>';
    team_html += '  <img class="team_logo" src="' + logo + '" />';
    if ( trophy ) {
      team_html += trophy; 
    }
    team_html += '  <h4 style="position: absolute; bottom: 0px; right: 10px;" ><font color="lightgray" size="+4" >#' + ranking  + '</font></h4>';

    if ( teams[ team ][ 'note' ] ) {
      team_html += '<p style="margin-bottom: 8px; margin-left: 8px; text-align: left;"><font color="lightgray"><i><b>Note:</b> ' + teams[ team ][ 'note' ] + '</i></font></p>';
    }

    team_html += '</div>';

    all_teams_html += team_html;
  }

  // Update the page div provides scrollable list of elements in sidebar:

  document.getElementById( 'elements' ).innerHTML = all_teams_html;    
   
} // listTeams()

/*

This function zooms to the selected region code in the Google GeoChart. This
are 3-digit numeric codes; see:

*/

function setRegion ( region ) {

  if ( region ) {
    options.region = region;
  }
  else {
    options.region = null;
  }

  // Set map to the selected region:

  geochart.draw( data, options );

      document.getElementById( 'regionSelector' ).selectedIndex = 0;

/*
sortLeaguesByDemonym()
This custom sort function sorts the world soccer leagues alphabetically by
their respective country's demonym (e.g. "American", "Dutch", "English", etc.).
*/

function sortLeaguesByDemonym ( leagues, a, b ) {
  
  var demonym_a = leagues[ a ][ 'demonym' ];
  var demonym_b = leagues[ b ][ 'demonym' ];

  if ( demonym_a < demonym_b ) {
    return -1;
  }
  else if ( demonym_a > demonym_b ) {
    return 1;
  }
  else {
    return 0;
  }

} // sortLeaguesByDemonym()


/*
sortTeamsByRanking()
This custom sort function sorts the teams in a league by their ranking.
*/

function sortTeamsByRanking ( teams, a, b ) {

  var rank_a = teams[ a ][ 'ranking' ];
  var rank_b = teams[ b ][ 'ranking' ];

  if ( rank_a < rank_b ) {
    return -1;
  }
  else if ( rank_a > rank_b ) {
    return 1;
  }
  else {
    return 0;
  } 

} // sortTeamsByRanking()


/*
getSmallLogo()
This function attempts to return a smaller version of the supplied logo image.
It will shrink the logo width by the supplied fraction (e.g. 0.5). It does this
based on known image URL patterns. Particularly, SVG PNG images from Wikipedia
can be dynamically resized. 
*/

function getSmallLogo ( logo, fraction, input_width, output_width, getUrlOnly ) {

  if ( !logo ) {
    return;
  }

  var small_logo = logo;
  var small_logo_width = 0;

  // Make small logo a fraction of the original?: 

  if ( fraction ) {

    // Did the user pass the width of the original logo?:

    if ( input_width ) {
      small_logo_width = parseInt( input_width * fraction );
    }

    // Otherwise, is this an SVG image from Wikipedia?:
 
    else if ( logo.match( /wikimedia/ ) ) {
      logo.match( /\/(\d+)px-/ );
      var logo_width = RegExp.$1;
      small_logo_width = parseInt( logo_width * fraction );
      small_logo = logo.replace( '\/' + logo_width + 'px-', '/' + small_logo_width + 'px-' );
    }

  }

  // Or did user specify a particular output width?:

  else if ( output_width ) {
   
    // Is this an SVG image from Wikipedia?:

    if ( logo.match( /wikimedia/ ) ) {
      logo.match( /\/(\d+)px-/ );
      var logo_width = RegExp.$1;
      small_logo = logo.replace( '\/' + logo_width + 'px-', '/' + output_width + 'px-' );
    }

    // Otherwise, set output width of img element:

    else {
      small_logo_width = output_width;
    }
  }

  // Cache this image for rapid display; otherwise, map hover shows delay:

  if ( !image_cache[ small_logo ] ) { 
    var image = new Image();
    image.src = small_logo;
    image_cache[ small_logo ] = image;
  }

  // Return the URL of the small logo image?:

  if ( getUrlOnly ) {
    return small_logo;
  }
 
  // Otherwise, return an HTML "img" element:

  else {
    var small_logo_img = '<img src="' + small_logo + '" ';

    if ( small_logo_width ) {
      small_logo_img += 'width="' + small_logo_width + '"'; 
    }

    small_logo_img += '/>'; 

    return small_logo_img;
  } 

} // getSmallLogo()
