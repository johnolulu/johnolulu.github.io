/*
Create CSS3 paper curl effect:
Source: http://www.sitepoint.com/pure-css3-paper-curls/
*/

.paper-curl {
  position: relative;
  /*width: 500px;*/
  padding: 25px;
  margin: 0 auto;
  background-color: #fff;
  -webkit-box-shadow: 0 0 4px rgba(0, 0, 0, 0.2), inset 0 0 50px rgba(0, 0, 0, 0.1);
  -moz-box-shadow: 0 0 4px rgba(0, 0, 0, 0.2), inset 0 0 50px rgba(0, 0, 0, 0.1);
  box-shadow: 0 0 5px rgba(0, 0, 0, 0.2), inset 0 0 50px rgba(0, 0, 0, 0.1);
}

.paper-curl:before, .paper-curl:after {
  position: absolute;
  width: 40%;
  height: 10px;
  content: ' ';
  left: 12px;
  bottom: 12px;
  background: transparent;
  -webkit-transform: skew(-5deg) rotate(-5deg);
  -moz-transform: skew(-5deg) rotate(-5deg);
  -ms-transform: skew(-5deg) rotate(-5deg);
  -o-transform: skew(-5deg) rotate(-5deg);
  transform: skew(-5deg) rotate(-5deg);
  -webkit-box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
  -moz-box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
  z-index: -1;
}

.paper-curl:after {
  left: auto;
  right: 12px;
  -webkit-transform: skew(5deg) rotate(5deg);
  -moz-transform: skew(5deg) rotate(5deg);
  -ms-transform: skew(5deg) rotate(5deg);
  -o-transform: skew(5deg) rotate(5deg);
  transform: skew(5deg) rotate(5deg);
}

function drawCountry ( country, league ) {

  if ( country ) {
    var country_code = countries[ country ][ 'code' ];
    $.ajax(
      {
        async: true,
        url: country_code + '.json?v=4',
        dataType: 'json',
        success: function ( teams ) {
          drawTeams( country, league, teams );
        }
      }
    );
    return;
    var country_color = countries[ country ][ 'color' ];
    var country_data = countries[ country ][ 'data' ];
    options.region = country_code; 
    options.displayMode = 'markers';
    //options.legend = null;
    //options.tooltip.isHtml = false;
    //options.tooltip.showTitle = false;
    options.resolution = 'provinces';
    //options.colorAxis = { colors: [ 'blue', 'green', 'yellow', 'orange', 'red' ] };
    options.colorAxis.colors = [ 'red', 'red' ]; // double color prevents light-dark shading
    geochart.clearChart();
    geochart.draw( country_data, options );

    // Map buttons:

    document.getElementById( 'element_button_img' ).src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/MLS_logo.svg/100px-MLS_logo.svg.png';
    document.getElementById( 'element_button' ).style.display = '';
    document.getElementById( 'flag_button_img' ).src = 'https://upload.wikimedia.org/wikipedia/en/thumb/a/a4/Flag_of_the_United_States.svg/100px-Flag_of_the_United_States.svg.png';
    document.getElementById( 'flag_button' ).style.display = '';
    document.getElementById( 'home_button' ).style.display = '';
  }
  else {
    options.region = 'world';
    options.resolution = 'countries';
    options.displayMode = 'regions';
    options.legend = 'none';
    //options.tooltip.isHtml = true;
    //options.tooltip.showTitle = true;
    options.colorAxis.colors = country_colors;
    //options.datalessRegionColor = null;
    geochart.clearChart();
    geochart.draw( data, options );
    document.getElementById( 'element_button' ).style.display = 'none';
    document.getElementById( 'flag_button' ).style.display = 'none';
    document.getElementById( 'home_button' ).style.display = 'none';
  }

  listTeams( country, league );

} // drawCountry()

function drawTeams ( country, league, teams ) {

  var country_code = countries[ country ][ 'code' ];
  var ranking_year = countries[ country ][ 'ranking_year' ]; 

  var all_teams_data = [
    [ 'Latitude', 'Longitude', 'Ranking', { 'role': 'tooltip', 'p': { 'html': true } } ]
  ];

  var num_teams = Object.keys(teams).length;

  for ( var team in teams ) {

    // Compile the data and display properties for this team:
 
    var city = teams[ team ][ 'city' ];
    var latitude = teams[ team ][ 'latitude' ];
    var longitude = teams[ team ][ 'longitude' ];
    var logo = teams[ team ][ 'logo' ];
    var founded = teams[ team ][ 'founded' ];
    var ranking = teams[ team ][ 'ranking' ];

    // Inverse of rank will determine size of marker on map (e.g. rank #1 out
    // 20 teams would get an inverse ranking of 20):
  
    var ranking_inverse = num_teams - ranking + 1;

    // Need small logo when hovering over marker icons on map:

    var small_logo = '';

    if ( logo.match( /wikimedia/ ) ) {
      logo.match( /(\d+)px/ );
      var logo_width_px = RegExp.$1; 
      var small_logo_width_px = parseInt( logo_width_px * 0.5 );
      small_logo = logo.replace( logo_width_px + 'px', small_logo_width_px + 'px' );
      
      // Pre-load this image so there is no lag when hovering over map:

      var image = new Image();
      image.src = small_logo;  
    }

    var team_data = [
      latitude,
      longitude,
      ranking_inverse,
      '<table><tr style="white-space: nowrap;"><td><p><font size="+1"><b>' + team + '</b></font></p><p>' + city + '</p><p>Founded: ' + founded + '</p><p>' + ranking_year + ' ranking: #' + ranking + '</p></td><td><img src="' + small_logo + '" /></td></tr></table>'
    ];

    all_teams_data.push( team_data );
  }

  all_teams_data = google.visualization.arrayToDataTable( all_teams_data );

  // Display the teams on the map:

  options.region = country_code;
  options.displayMode = 'markers';
  //options.legend = null;
  //options.tooltip.isHtml = false;
  //options.tooltip.showTitle = false;
  options.resolution = 'provinces';
  //options.colorAxis = { colors: [ 'blue', 'green', 'yellow', 'orange', 'red' ] };
  options.colorAxis.colors = [ 'red', 'red' ]; // double color prevents light-dark shading
  geochart.clearChart();
  geochart.draw( all_teams_data, options );

  // Add icons and buttons to the map:

  document.getElementById( 'element_button_img' ).src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/MLS_logo.svg/100px-MLS_logo.svg.png';
  document.getElementById( 'element_button' ).style.display = '';
  document.getElementById( 'flag_button_img' ).src = 'https://upload.wikimedia.org/wikipedia/en/thumb/a/a4/Flag_of_the_United_States.svg/100px-Flag_of_the_United_States.svg.png';
  document.getElementById( 'flag_button' ).style.display = '';
  document.getElementById( 'home_button' ).style.display = '';

} // drawTeams()
 
function listTeams ( country, league ) {

  if ( country ) {

    document.getElementById( 'subheader' ).innerHTML = league + ':';
    document.getElementById( 'elements' ).style.display = 'none';
    var teams_div = 'elements_' + countries[ country ][ 'code' ];
    displayed_teams_div = teams_div;

    scrollToPageTop( teams_div );

    var teams_html = '';
    var teams = countries[ country ][ 'teams' ];

    var i = 0;

    for ( var team in teams ) {

      var logo = teams[ team ][ 'logo' ]; 

      teams_html += '<div class="element" onClick="" onMouseOver="geochart.setSelection( [ { row: ' + i + ' } ] );" onMouseOut="geochart.setSelection();">';
      teams_html += '<h4>' + team + ':</h4>';
      teams_html += '<img class="team_logo" src="' + logo + '" />';
      teams_html += '</div>';

      i++;
    }

    document.getElementById( teams_div ).innerHTML = teams_html;    
    document.getElementById( teams_div ).style.display = '';
  }
  else {
    if ( displayed_teams_div
      && document.getElementById( displayed_teams_div ) ) {
      document.getElementById( displayed_teams_div ).style.display = 'none';
    }
    document.getElementById( 'subheader' ).innerHTML = 'Soccer Leagues:';
    scrollToPageTop( 'elements' );
  }
   
} // listTeams()

function scrollToPageTop ( div_id ) {

  if ( div_id
    && document.getElementById( div_id ) ) {
    document.getElementById( div_id ).style.display = 'none';
  }

  setTimeout( 
    function () {
      window.scrollTo( 0, 0 );
      if ( div_id
        && document.getElementById( div_id ) ) {
        document.getElementById( div_id ).style.display = '';
      }
    },
    5
  );

} // scrollToPageTop()

</script>
